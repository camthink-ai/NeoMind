# Clippy configuration for NeoMind project
# Some warnings are allowed for specific reasons

# Allow dead code for public API items and future use
dead-code = "allow"

# Allow complex types in extension system (unavoidable due to trait objects)
type-complexity = "allow"

# Allow needless_main in doctests (examples need main function)
needless-doctest-main = "allow"

# Allow manual strip for compatibility
manual-strip = "allow"
